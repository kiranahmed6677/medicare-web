name: MediCare CD Pipeline
 
on:
 push:
   branches: [ main ]    # Sirf main par deploy hoga
 
jobs:
 # ════════════════════════════════
 # STAGE 1: CI Pehle Pass Karni Hay
 # ════════════════════════════════
 ci-check:
   name: CI Checks
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v3
     - name: Files verify
       run: |
         test -f index.html || exit 1
         test -f css/style.css || exit 1
         echo "✅ CI checks passed!"
 
 # ════════════════════════════════
 # STAGE 2: Deployment Info
 # ════════════════════════════════
 deploy-info:
   name: Deployment Information
   runs-on: ubuntu-latest
   needs: ci-check       # CI pass hone k baad hi chalega!
   steps:
     - uses: actions/checkout@v3
     
     - name: Deploy details print karo
       run: |
         echo "════════════════════════════"
         echo "🏥 MediCare.pk Deployment"
         echo "════════════════════════════"
         echo "👤 Developer: ${{ github.actor }}"
         echo "📝 Commit: ${{ github.sha }}"
         echo "🌿 Branch: ${{ github.ref_name }}"
         echo "📅 Time: $(date)"
         echo "════════════════════════════"
     
     - name: Files list karo
       run: |
         echo "📁 Deployed files:"
         ls -la
         echo "✅ Ready for deployment!"
     
     - name: Success message
       if: success()
       run: |
         echo "🎉 Pipeline successful!"
         echo "🌐 MediCare.pk is ready!"
     
     - name: Failure message
       if: failure()
       run: |
         echo "❌ Pipeline failed!"
         echo "⏪ Check the errors above"