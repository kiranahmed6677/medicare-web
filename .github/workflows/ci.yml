Ci.yml

name: MediCare CI Pipeline
 
on:
 push:
   branches: [ main, develop ]
 pull_request:
   branches: [ main ]
 
jobs:
 # ════════════════════════════════
 # JOB 1: HTML Files Check
 # ════════════════════════════════
 check-html:
   name: HTML Files Check karo
   runs-on: ubuntu-latest
   
   steps:
     - name: Code checkout
       uses: actions/checkout@v3
     
     - name: index.html check
       run: |
         echo "Checking index.html..."
         test -f index.html && echo "✅ index.html exists!" || exit 1
     
     - name: HTML structure check
       run: |
         grep -q "<!DOCTYPE html>" index.html && echo "✅ DOCTYPE ok" || exit 1
         grep -q "<title>" index.html && echo "✅ Title tag ok" || exit 1
         grep -q "</html>" index.html && echo "✅ HTML closed" || exit 1
 
 # ════════════════════════════════
 # JOB 2: Project Structure Check
 # ════════════════════════════════
 check-structure:
   name: Project Structure check karo
   runs-on: ubuntu-latest
   
   steps:
     - name: Code checkout
       uses: actions/checkout@v3
     
     - name: Required files check
       run: |
         echo "📋 Project structure check..."
         test -f index.html     && echo "✅ index.html" || exit 1
         test -f css/style.css  && echo "✅ style.css"  || exit 1
         test -f js/main.js     && echo "✅ main.js"    || exit 1
         test -f README.md      && echo "✅ README.md"  || exit 1
         echo "All files present! 🎉"
     
     - name: Folders check
       run: |
         test -d css && echo "✅ css folder" || exit 1
         test -d js  && echo "✅ js folder"  || exit 1
         echo "All folders ok!"
 
 # ════════════════════════════════
 # JOB 3: Security Check
 # ════════════════════════════════
 security-check:
   name: Security check karo
   runs-on: ubuntu-latest
   
   steps:
     - name: Code checkout
       uses: actions/checkout@v3
     
     - name: Sensitive info check
       run: |
         echo "🔒 Security scan..."
         ! grep -ri "password" index.html && echo "✅ No passwords" || echo "⚠️ Password found!"
         ! grep -ri "api_key" index.html  && echo "✅ No API keys"  || echo "⚠️ API key found!"
         test ! -f .env && echo "✅ No .env file" || echo "⚠️ .env found!"
         echo "Security scan complete!"